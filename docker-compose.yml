# Dev services only — the app itself runs natively via `pnpm dev`.
# `name` prefixes all containers/volumes; create-cen-app rewrites it to your project name.
name: cen-app

services:
  db:
    image: postgres:18-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: app
    ports:
      # DB_PORT comes from .env — change it (and DATABASE_URL) if 5432 is taken on your machine
      - "${DB_PORT:-5432}:5432"
    volumes:
      # postgres 18+ images store data under /var/lib/postgresql (not …/data)
      - db-data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d app"]
      interval: 2s
      timeout: 3s
      retries: 30

volumes:
  db-data:
