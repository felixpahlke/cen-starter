apiVersion: apps/v1
kind: Deployment
metadata:
  name: cen-starter
  labels:
    app.kubernetes.io/name: cen-starter
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: cen-starter
  template:
    metadata:
      labels:
        app.kubernetes.io/name: cen-starter
    spec:
      containers:
        - name: cen-starter
          image: cen-starter:latest # Placeholder; override with kustomize images: or deploy.sh -i.
          ports:
            - name: http
              containerPort: 8080
          envFrom:
            - secretRef:
                name: app-env
          readinessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 2
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 20
            periodSeconds: 20
            timeoutSeconds: 2
            failureThreshold: 3
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
